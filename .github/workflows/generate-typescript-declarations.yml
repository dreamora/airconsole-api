name: Generate TypeScript Declarations

on:
  push:
    tags:
      - 'v*'  # Trigger on release tags like v1.9.0, v1.10.0, etc.

jobs:
  generate-types:
    name: Generate and commit TypeScript declarations
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow writing to repository
      pull-requests: write  # Allow creating/updating PRs
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch all history to ensure we can push to main branch
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Generate TypeScript declarations
      run: npm run generate-types
      
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Pull Request
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: types-generation-${{ github.ref_name }}
        title: "Generate TypeScript declarations for ${{ github.ref_name }}"
        body: |
          Automatically generated TypeScript declarations for AirConsole API ${{ github.ref_name }}.
          
          This PR includes:
          - Updated `index.d.ts` with TypeScript declarations generated from JSDoc comments
          - Updated `package.json` with new version number
          
          Generated from: ${{ github.sha }}
        commit-message: "Generate TypeScript declarations for ${{ github.ref_name }}"
        committer: GitHub Action <action@github.com>
        author: GitHub Action <action@github.com>
        delete-branch: true
        add-paths: |
          index.d.ts
          package.json
        
    - name: Create or update npm package (optional)
      if: steps.verify-changed-files.outputs.changed == 'true'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        # Only publish if NPM_TOKEN is available
        if [ -n "$NODE_AUTH_TOKEN" ]; then
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
        else
          echo "NPM_TOKEN not set, skipping npm publish"
        fi